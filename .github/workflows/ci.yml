name: CI

on:
  push:
    branches: [main, dev, "feat/**"]
  pull_request:
    branches: [main, dev]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (editable, no torch in CI smoke)
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src
      - name: Import smoke
        run: python -c "import fed_agent; print('fed_agent', fed_agent.__version__)"
