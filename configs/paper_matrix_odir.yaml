version: paper_matrix.v1

# =============================================================================
# 第二数据集 ODIR 跨数据集复现矩阵
# =============================================================================
# 目的：在第二个多标签眼底数据集（ODIR，8 类 N/D/G/C/A/H/M/O）上复现主结论，
# 证明 RETFound+LoRA+联邦 框架的泛化性。结构与 RFMiD 主矩阵一致。
#
# 前置（见 docs/SECOND_DATASET_ODIR.md）：
#   1. 导出数据：python3 -m fed_agent.tools.export_odir --source hf --out_dir data/raw/odir
#   2. 生成划分（注意 out_dir 用 generated_odir，避免和 RFMiD 同名 labels__ 冲突）：
#        for s in 0 1 2; do
#          python3 -m fed_agent.tools.build_splits \
#            --labels_csv data/raw/odir/train/labels.csv \
#            --out_dir configs/splits/generated_odir \
#            --seed $s --n_clients 4 --alphas 0.1 0.5 1.0
#        done
#
# 运行：
#   PAPER_MATRIX_YAML=configs/paper_matrix_odir.yaml ./run.sh
# =============================================================================

dataset:
  train_labels_csv: data/raw/odir/train/labels.csv
  train_images_dir: data/raw/odir/train/images
  validation_labels_csv: data/raw/odir/validation/labels.csv
  validation_images_dir: data/raw/odir/validation/images
  test_labels_csv: data/raw/odir/test/labels.csv
  test_images_dir: data/raw/odir/test/images
  split_json: configs/splits/generated_odir/labels__iid_K4_S0.json

defaults:
  backbone: retfound_mae_vit_large
  image_size: [224, 224]
  batch_size: 16
  epochs: 20
  rounds: 40
  local_epochs: 1
  lr: 0.001
  lora_rank: 8
  lora_alpha: 16.0
  fedprox_mu: 0.01
  device: cuda
  require_retfound: true
  loss: balanced_bce
  positive_dropout: 0.0
  train_label_noise: 0.0

runs:
  # ---- 对比 (seed 0/1/2, IID) ----
  - { name: odir_centralized_s0,    method: centralized,    seed: 0 }
  - { name: odir_local_only_s0,     method: local_only,     seed: 0, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_fedavg_s0,         method: fedavg,         seed: 0, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_fedprox_s0,        method: fedprox,        seed: 0, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_robust_s0,         method: robust_fedprox, seed: 0, positive_dropout: 0.1, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_centralized_s1,    method: centralized,    seed: 1 }
  - { name: odir_fedavg_s1,         method: fedavg,         seed: 1, split_json: configs/splits/generated_odir/labels__iid_K4_S1.json }
  - { name: odir_robust_s1,         method: robust_fedprox, seed: 1, positive_dropout: 0.1, split_json: configs/splits/generated_odir/labels__iid_K4_S1.json }
  - { name: odir_centralized_s2,    method: centralized,    seed: 2 }
  - { name: odir_fedavg_s2,         method: fedavg,         seed: 2, split_json: configs/splits/generated_odir/labels__iid_K4_S2.json }
  - { name: odir_robust_s2,         method: robust_fedprox, seed: 2, positive_dropout: 0.1, split_json: configs/splits/generated_odir/labels__iid_K4_S2.json }

  # ---- 鲁棒性（噪声 0.2/0.4, seed 0；解耦版 fedavg+dropout 也测）----
  - { name: odir_fedavg_n2_s0,      method: fedavg,         seed: 0, train_label_noise: 0.2, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_fedavgdrop_n2_s0,  method: fedavg,         seed: 0, positive_dropout: 0.1, train_label_noise: 0.2, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_robust_n2_s0,      method: robust_fedprox, seed: 0, positive_dropout: 0.1, train_label_noise: 0.2, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_fedavg_n4_s0,      method: fedavg,         seed: 0, train_label_noise: 0.4, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_fedavgdrop_n4_s0,  method: fedavg,         seed: 0, positive_dropout: 0.1, train_label_noise: 0.4, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
  - { name: odir_robust_n4_s0,      method: robust_fedprox, seed: 0, positive_dropout: 0.1, train_label_noise: 0.4, split_json: configs/splits/generated_odir/labels__iid_K4_S0.json }
