version: paper_matrix.v1

# Multi-seed LOCAL smoke (CPU, TinyCNN, subset): de-risk gate before GPU.
# Heterogeneous noise (clients 2,3 flip@0.4); fedavg vs agent over 3 seeds.
#   python3 -m fed_agent.tools.run_paper_matrix \
#     --matrix_yaml configs/paper_matrix_agent_smoke3.yaml \
#     --out_dir runs/paper_matrix/agent_smoke3
#   python3 -m fed_agent.tools.summarize_agent runs/paper_matrix/agent_smoke3/summary.json

dataset:
  train_labels_csv: data/raw/rfmid_sub/train/head12_labels.csv
  train_images_dir: data/raw/rfmid_full/train/images
  validation_labels_csv: data/raw/rfmid_sub/validation/head12_labels.csv
  validation_images_dir: data/raw/rfmid_full/validation/images
  probe_labels_csv: data/raw/rfmid_sub/validation/head12_labels.csv
  probe_images_dir: data/raw/rfmid_full/validation/images
  split_json: configs/splits/generated/rfmid_sub_head12_iid_K4_S0.json

defaults:
  method: agent_fed
  backbone: tiny_cnn
  image_size: [64, 64]
  batch_size: 16
  rounds: 8
  local_epochs: 2
  lr: 0.001
  device: cpu
  require_retfound: false
  loss: balanced_bce
  agent_tau: 0.03
  agent_noisy_clients: [2, 3]
  agent_client_noise: 0.4

runs:
  - { name: het04_fedavg_s0, agent_aggregation: size,  seed: 0 }
  - { name: het04_fedavg_s1, agent_aggregation: size,  seed: 1 }
  - { name: het04_fedavg_s2, agent_aggregation: size,  seed: 2 }
  - { name: het04_agent_s0,  agent_aggregation: agent, seed: 0 }
  - { name: het04_agent_s1,  agent_aggregation: agent, seed: 1 }
  - { name: het04_agent_s2,  agent_aggregation: agent, seed: 2 }
