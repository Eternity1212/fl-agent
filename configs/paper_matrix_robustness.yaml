version: paper_matrix.v1

# =============================================================================
# 鲁棒性决战矩阵（论文核心图）
# =============================================================================
# 目的：回答"在标签噪声下，抗噪正则是否真的有用，以及它应该挂在 FedAvg 还是
# FedProx 上"。这是 robust 叙事生死的唯一决定性证据。
#
# 三个变体 × 噪声 {0, 0.2, 0.4} × seed {0,1,2} = 27 run：
#   - fedavg            : 控制组（无 proximal、无抗噪正则）
#   - fedavg_dropout    : FedAvg + positive_dropout 0.1（解耦的"纯抗噪"版，μ=0）
#   - robust_fedprox    : 原方案 = FedProx(μ=0.05) + positive_dropout 0.1
#
# 关键读法（跑完看 macro-AUROC / best macro-F1 随噪声的下降斜率）：
#   - 若 fedavg_dropout 在 noise=0 不输 fedavg，且 noise↑ 时下降明显更慢
#     -> 论文主卖点成立："一个简单的抗噪正则让 FedAvg 在噪声下更稳"。
#   - 若 robust_fedprox < fedavg_dropout -> 说明 proximal 是累赘，论文应主推
#     fedavg_dropout，把 robust_fedprox 作为对照。
#   - 若两者在噪声下都不赢 fedavg -> robust 叙事确实不成立，转 negative finding。
#
# 运行：
#   PAPER_MATRIX_YAML=configs/paper_matrix_robustness.yaml ./run.sh
# 断点续跑：已完成的 run 自动跳过。
# =============================================================================

dataset:
  train_labels_csv: data/raw/rfmid_full/train/labels.csv
  train_images_dir: data/raw/rfmid_full/train/images
  validation_labels_csv: data/raw/rfmid_full/validation/labels.csv
  validation_images_dir: data/raw/rfmid_full/validation/images
  test_labels_csv: data/raw/rfmid_full/test/labels.csv
  test_images_dir: data/raw/rfmid_full/test/images
  split_json: configs/splits/generated/labels__iid_K4_S0.json

defaults:
  backbone: retfound_mae_vit_large
  image_size: [224, 224]
  batch_size: 16
  epochs: 20
  rounds: 40
  local_epochs: 1
  lr: 0.001
  lora_rank: 8
  lora_alpha: 16.0
  fedprox_mu: 0.05
  device: cuda
  require_retfound: true
  loss: balanced_bce
  positive_dropout: 0.0
  train_label_noise: 0.0

runs:
  # ---- seed 0 ----
  - { name: r_fedavg_n0_s0,        method: fedavg,         seed: 0, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  - { name: r_fedavg_n2_s0,        method: fedavg,         seed: 0, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  - { name: r_fedavg_n4_s0,        method: fedavg,         seed: 0, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  - { name: r_fedavgdrop_n0_s0,    method: fedavg,         seed: 0, positive_dropout: 0.1, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  - { name: r_fedavgdrop_n2_s0,    method: fedavg,         seed: 0, positive_dropout: 0.1, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  - { name: r_fedavgdrop_n4_s0,    method: fedavg,         seed: 0, positive_dropout: 0.1, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  - { name: r_robust_n0_s0,        method: robust_fedprox, seed: 0, positive_dropout: 0.1, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  - { name: r_robust_n2_s0,        method: robust_fedprox, seed: 0, positive_dropout: 0.1, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  - { name: r_robust_n4_s0,        method: robust_fedprox, seed: 0, positive_dropout: 0.1, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S0.json }
  # ---- seed 1 ----
  - { name: r_fedavg_n0_s1,        method: fedavg,         seed: 1, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  - { name: r_fedavg_n2_s1,        method: fedavg,         seed: 1, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  - { name: r_fedavg_n4_s1,        method: fedavg,         seed: 1, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  - { name: r_fedavgdrop_n0_s1,    method: fedavg,         seed: 1, positive_dropout: 0.1, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  - { name: r_fedavgdrop_n2_s1,    method: fedavg,         seed: 1, positive_dropout: 0.1, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  - { name: r_fedavgdrop_n4_s1,    method: fedavg,         seed: 1, positive_dropout: 0.1, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  - { name: r_robust_n0_s1,        method: robust_fedprox, seed: 1, positive_dropout: 0.1, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  - { name: r_robust_n2_s1,        method: robust_fedprox, seed: 1, positive_dropout: 0.1, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  - { name: r_robust_n4_s1,        method: robust_fedprox, seed: 1, positive_dropout: 0.1, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S1.json }
  # ---- seed 2 ----
  - { name: r_fedavg_n0_s2,        method: fedavg,         seed: 2, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S2.json }
  - { name: r_fedavg_n2_s2,        method: fedavg,         seed: 2, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S2.json }
  - { name: r_fedavg_n4_s2,        method: fedavg,         seed: 2, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S2.json }
  - { name: r_fedavgdrop_n0_s2,    method: fedavg,         seed: 2, positive_dropout: 0.1, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S2.json }
  - { name: r_fedavgdrop_n2_s2,    method: fedavg,         seed: 2, positive_dropout: 0.1, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S2.json }
  - { name: r_fedavgdrop_n4_s2,    method: fedavg,         seed: 2, positive_dropout: 0.1, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S2.json }
  - { name: r_robust_n0_s2,        method: robust_fedprox, seed: 2, positive_dropout: 0.1, train_label_noise: 0.0, split_json: configs/splits/generated/labels__iid_K4_S2.json }
  - { name: r_robust_n2_s2,        method: robust_fedprox, seed: 2, positive_dropout: 0.1, train_label_noise: 0.2, split_json: configs/splits/generated/labels__iid_K4_S2.json }
  - { name: r_robust_n4_s2,        method: robust_fedprox, seed: 2, positive_dropout: 0.1, train_label_noise: 0.4, split_json: configs/splits/generated/labels__iid_K4_S2.json }
